# pv_geom default configuration. Mirrors PRD §9.2 with spike-derived overrides
# (see STATUS.md "Three PRD assumptions to update before M3").
crs:
  target: EPSG:6341           # NAD83(2011) / UTM zone 12N (metres); USGS LPC AZ tiles

panel_plane:
  erosion_m: 0.15
  ransac_threshold_m: 0.05
  min_inlier_frac: 0.6
  max_iter: 200
  min_density_pts_per_m2: 3   # spike: tiles deliver ~9-11 pts/m^2; 3 is the safe floor
  min_points: 30              # flat floor (PRD §7.1's area-based formula was too lax)
  tilt_floor_deg: 1.0
  uncertainty_method: bootstrap   # bootstrap | covariance
  bootstrap_samples: 50

multi_plane:
  enabled: true
  secondary_min_frac: 0.20
  ew_rack_azimuth_tol_deg: 25
  ew_rack_tilt_tol_deg: 5

roof_plane:
  enabled: true
  buffer_m: 3.0
  buffer_max_m: 5.0
  min_points: 100
  rmse_max_m: 0.10

heights:
  ground_search_radius_m: 10.0
  use_whitebox_dem: false

mounting_rules:
  R1: { panel_roof_angle_deg_max: 5.0, height_above_roof_m_max: 0.5 }
  R2: { panel_roof_angle_deg_min: 5.0, height_above_roof_m_max: 1.5,
        fallback_tilt_deg_min: 5.0, fallback_height_above_ground_m_min: 2.5 }
  R3: { height_above_ground_m_min: 2.0, aspect_ratio_min: 2.0 }
  R4: { aspect_ratio_min: 4.0, tilt_deg_max: 35.0, height_above_ground_m_max: 2.0 }
  R5: { tilt_deg_min: 5.0, height_above_ground_m_max: 2.0 }
  confidence_margin: 0.5

io:
  lidar_reader: laspy          # laspy | pdal (pdal needs the [pdal] extra + system libs)
  s3:
    requester_pays: false
    region: us-east-2
  classification:              # ASPRS classes used per role; spike found USGS LPC tiles
    panel_class_primary: 6     #   are class-1/2/7 only (no class 6), so we fall back to
    panel_class_fallback: 1    #   class-1 returns above-ground when class 6 is absent.
    ground_class: 2
    fallback_height_above_ground_m: 1.5    # min HAG to keep a class-1 return as panel-candidate

compute:
  backend: local               # local | coiled
  coiled:
    name: pv-geom
    n_workers: 40
    worker_memory: "8GiB"
    worker_cpu: 4
    software: pv-geom-2026-05
  local:
    n_workers: 8
    threads_per_worker: 2

output:
  partition_size: 100000
  write_geoparquet: true
  also_write_csv: false
